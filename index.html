<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="google-site-verification" content="4SQSui69n1gKyY2JxkqwODCFJt1VVwjOiRMJrOePcQw" />
<title>The Basement Coders</title>
<style>
  :root { --ink:#20242e; --paper:#f7f3e9; --indigo:#3f51b5; }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
  }
  header { line-height: 0; }
  header .banner { display: block; width: 100%; height: auto; }
  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
  }
  main { max-width: 820px; margin: 0 auto; padding: 40px 20px 64px; }
  h2 { color: var(--indigo); }
  .apps { display: grid; gap: 16px; margin-top: 16px; }
  .card {
    display: flex; align-items: center; gap: 16px; text-decoration: none;
    color: inherit; background: #fff; border: 1px solid #e7e0cf;
    border-radius: 14px; padding: 16px; transition: box-shadow .15s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); }
  .card img { width: 64px; height: 64px; border-radius: 14px; }
  .card h3 { margin: 0 0 2px; }
  .card p { margin: 0; color: #5a5a5a; font-size: .95rem; }
  a { color: var(--indigo); }
  .contact a { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
  .contact-icon { width: 24px; height: 24px; border-radius: 6px; vertical-align: middle; }
  footer { text-align: center; color: #6a6a6a; font-size: .85rem; padding: 24px; }
</style>
</head>
<body>
<header>
  <h1 class="sr-only">The Basement Coders — small, useful apps, made with care.</h1>
  <img class="banner" src="web-header.png"
       alt="The Basement Coders — small, useful apps, made with care.">
</header>
<main>
  <h2>Apps</h2>
  <div class="apps">
    <a class="card" href="openkanji/">
      <img src="openkanji/icon.png" alt="OpenKanji icon">
      <div>
        <h3>OpenKanji</h3>
        <p>Learn JLPT kanji — write, quiz, and study with spaced repetition. Offline.</p>
      </div>
    </a>
  </div>

  <h2>Contact</h2>
  <p class="contact"><a href="mailto:thebasementcoders@gmail.com"><img class="contact-icon" src="contact-icon-512.png" alt=""> thebasementcoders@gmail.com</a></p>
</main>
<footer>© 2026 The Basement Coders</footer>
</body>
</html>
